name: api_scam_shield

services:
  postgres:
    container_name: api_scam_shield_postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scam
      POSTGRES_PASSWORD: scam
      POSTGRES_DB: scam_shield
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api:
    container_name: api_scam_shield_api
    build: .
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
    name: api_scam_shield_pgdata
