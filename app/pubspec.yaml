name: scam_shield_mvp
description: Scam Shield MVP - AI scam scanner with backend rules + subscription gate.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  firebase_analytics: ^12.1.2
  firebase_core: ^4.4.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  http: ^1.2.2
  purchases_flutter: ^9.12.2
  purchases_ui_flutter: ^9.12.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/brand/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
    - assets/i18n/
